    <style>
        *{
margin: 0;
padding: 0;
box-sizing: border-box;
}
*:focus{
outline: none;
}
body{
position:relative;
width:100%;
min-height:100vh;
height:auto;
display:flex;
justify-content:center;
align-items:center;
background-size:cover;
background-position:center;
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen';
overflow: scroll;
}
.bg{
display:flex;
justify-content:center;
align-items:center;
background-color: rgb(255, 255, 255);
width: 100vw;
height: 100vh;
position: absolute;
}


  .pd-load {
    width: 50px;
    height: 50px;
    border-radius:10%;
    display:block;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 0 auto 20px;
    animation: pulse 1s ease-in-out infinite;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }



@keyframes pulse {
  0%, 100% {
    transform: scale(1.1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }
  50% {
    transform: scale(1.3);
    box-shadow: 0 8px 30px rgba(81, 42, 42, 0.6);
  }
}



.head{
  color:#000;
  text-align: center;
  font-size: 14px;
  margin-bottom: 20px;
}


.form{

width:350px;
height:auto;
color: #fff;
font-family: 'roboto', sans-serif;
z-index: 99;
display:none;
flex-direction:column;
position: absolute;
top:50%;
left:50%;
transform: translate(-50%, -50%);
padding:50px 15px 20px;
border-radius:5px;
transition: .6s;
background-color: rgba(255, 255, 255, 0);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
animation: fadeIn 0.7s ease-in;
 box-shadow: 
0 15px 35px rgba(27, 22, 22, 0.3),
0 5px 15px rgba(177, 174, 174, 0.2),
inset 0 1px 0 rgba(205, 203, 203, 0.5);
}

@keyframes fadeIn{
0%{opacity:0;}
100%{opacity:1;
}
}


.login-form{
width:100%;
background-color: rgba(255, 255, 255, 0);
}


.logo{
margin-bottom:20px;
opacity:1;
}
.logo img{
display:block;
margin:0 auto;
height:50px;
width: 50px;
border-radius:5px;
}


.input-group {
      position: relative;
      margin-bottom: 30px;
}


input {
      width: 100%;
      padding:6px 8px;
      background-color: #ffffff;
      border: 0.1rem solid #d20000;
      border-radius: 5px;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-width:1px;
      border-color: #d20000;
    }

    label {
      position: absolute;
      left: 10px;
      top: 10px;
      color: #999;
      font-size: 14px;
      pointer-events: none;
      transition: all 0.3s;
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -10px;
      left: 10px;
      font-size: 14px;
      color: #050202;
      background: white;
      padding: 0 5px;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
      font-size: 5px;
      user-select: none;
    }

    .eye-open {
      display: inline-block;
    }

    .eye-closed {
      display: none;
    }




    button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 1px 0px;
      background: linear-gradient(135deg, #a72424 0%, #985a51 100%);
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button svg{
height:25px;
color:#fff;
margin-right: 10px;
}

 button:hover{
      transform: translateY(-2px);
  }

button:active {
      transform: translateY(0);
  }


  .socials{ 
font-weight:700;
font-size:8px;
display: flex;
justify-content:space-between;
margin:25px auto 0px;
padding:0px 5px;
width:100%;
border:none;
background-color:rgba(255, 255, 255, 0.3);
opacity:1;
}
.socials a{
text-decoration:none;
}
.socials span{
display:flex;
justify-content: center;
align-items: center;
color: #fff;
}
.socials span img{
height:15px;
margin-right: 5px
}



.ad-logo{
display:block;
width: 300px;
height: 200px;
position: absolute;
bottom:80%;
left:68%;
transform: translate(-60%, -50%);
color: black;
font-weight: 700;
font-size: 15px;
}

.ad-logo img{
    width: 200px;
   
}


.alert{
padding: 0px 0px 20px 0px;
text-align: center;
white-space: nowrap;
width:100%;
color: brown;
font-size: 10px;
font-weight: 600;
}



@media screen and (min-width: 768px){
.form{
width:380px;
height:500px;
position: absolute;
top:50%;
right:50%;
transform: translate(40%, -50%);
}

.ad-logo{
position: absolute;
top:50%;
left:-150%;
transform: translate(-50%, -50%);
}
}

    </style>
</head>
